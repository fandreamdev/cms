services:
  mongodb:
    image: mongo:8.0
    container_name: cms-mongodb
    restart: unless-stopped
    ports:
      - '${MONGODB_PORT:-27017}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-cms}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-cms_local_password}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-cms}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval "db.runCommand({ ping: 1 }).ok" | grep 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongodb_data:
